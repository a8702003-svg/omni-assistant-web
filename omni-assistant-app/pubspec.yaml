name: omni_assistant_app
description: "A premium Omni-Assistant mobile app supporting multi-lingual i18n and Firebase."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Firebase Core
  firebase_core: ^2.27.0
  firebase_auth: ^4.17.8
  cloud_firestore: ^4.15.8
  firebase_storage: ^11.6.8

  # 國際化 i18n JSON 載入器
  easy_localization: ^3.0.3

  # 定位服務與圖示
  geolocator: ^10.1.0
  record: ^5.0.4
  path_provider: ^2.1.2
  lucide_icons: ^0.320.0
  google_fonts: ^6.1.0
  provider: ^6.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  # 配置翻譯 JSON 的讀取路徑
  assets:
    - assets/translations/
